body:
  text: 郭世貴一心供養清信駱花嬰一心供養佛時夫大覺神遷非經像無以表其真益世閏時憑形質如取利然僧演減割衣鉢之資造石像壹區金像三區浮圖三級大般涅槃經兩部雜經三百品供養僧卅人上為國主百僚師徒所生法界之類咸同正覺大統四年歲次戊午七月十五日比丘僧演敬造供養比丘道暈比丘僧暢比丘僧通比丘僧演比丘僧普比丘惠云比丘法迴比丘僧敬比丘僧轁比丘僧端比丘法豪比丘道賢比丘僧曠比丘僧云比丘僧和比丘惠遵比丘僧濟比丘道洸比丘僧玉比丘法崇比丘僧均比丘法和董大女供養佛清信士萬董當供養佛時董僧供養佛時董歡供養佛時清信女趙季寄供養董樂供養佛清信女李供養姚舍欣供養佛殄難將軍郭穆供養佛清信女李妙供養伏波將軍任歡供養佛
